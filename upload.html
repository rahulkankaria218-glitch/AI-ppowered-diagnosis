<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Scan | MedAI Diagnostics</title>
  <link rel="stylesheet" href="upload.css" />
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="container navbar-inner">
      <div class="logo">MedAI Diagnostics</div>
      <nav class="nav-links">
        <a href="landingpage.html">Home</a>
        <a href="features.html">Features</a>
        <a href="workflow.html">Workflow</a>
        <a href="about.html">About</a>
      </nav>
      <a href="login.html"><button class="btn btn-outline">Logout</button></a>
    </div>
  </header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Upload Medical Scan</h1>
      <p>Submit patient scan for AI-powered diagnostic analysis</p>
    </div>
  </section>

  <!-- Upload Form -->
  <section class="upload-section">
    <div class="container">
      <div class="upload-card">
        <form action="processing.html"></form>

        <!-- Patient Details -->
        <h2>Patient Details</h2>

        <div class="form-grid">
          <div class="form-group">
            <label>Patient Name</label>
            <input type="text" placeholder="Enter patient name" required />
          </div>

          <div class="form-group">
            <label>Patient ID</label>
            <input type="text" placeholder="Enter patient ID" required />
          </div>

          <div class="form-group">
            <label>Age</label>
            <input type="number" placeholder="Enter age" required />
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select required>
              <option value="">Select gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-group full">
          <label>Symptoms (Optional)</label>
          <textarea placeholder="Enter symptoms"></textarea>
        </div>

        <!-- Scan Details -->
        <h2>Scan Details</h2>

        <div class="form-grid">
          <div class="form-group">
            <label>Scan Type</label>
            <select required>
              <option value="">Select scan type</option>
              <option>X-Ray</option>
              <option>CT Scan</option>
              <option>MRI</option>
            </select>
          </div>

          <div class="form-group">
            <label>Body Part</label>
            <input type="text" placeholder="e.g. Chest, Brain, Abdomen" required />
          </div>
        </div>

        <!-- File Upload -->
        <h2>Upload Scan File</h2>

        <div class="upload-box">
          <input type="file" required />
          <p>Drag & drop scan file here or click to browse</p>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary">Run AI Analysis</button>

        </form>

      </div>
    </div>
  </section>

</body>
<script>
document.querySelector("form").addEventListener("submit", function() {
  window.location.href = "processing.html";
});
</script>

</html>
